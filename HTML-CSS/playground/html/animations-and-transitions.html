<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/animations-and-transitions.css" />
    <title>Animations and Transitions Practice</title>
  </head>
  <body>
    <!-- Transitions -->
    <div class="transitions-wrapper">
      <!-- SCALE -->
      <div class="box scaleX-box">Scale by X axis</div>
      <div class="box scaleY-box">Scale by Y axis</div>
      <div class="box scale-box">Scale by X and Y axis</div>
      <!-- ROTATE -->
      <div class="box rotateX-box">Rotate by X axis</div>
      <div class="box rotateY-box">Rotate by Y axis</div>
      <div class="box rotate-box">Rotate by X and Y axis</div>
      <!--SKEW  -->
      <div class="box skewX-box">Skew by X axis</div>
      <div class="box skewY-box">Skew by Y axis</div>
      <div class="box skew-box">Skew by X and Y axis</div>
      <!-- TRANSLATE -->
       <div class="box translateX-box">Translate by X axis</div>
       <div class="box translateY-box">Translate by Y axis</div>
       <div class="box translate-box">Translate by X and Y axis</div>
     <!-- ANIMATIONS  -->
      <div class="animations-wrapper">

      </div>
    </div>
  </body>
</html>
