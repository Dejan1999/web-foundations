<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=\, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/grid.css" />
    <title>Grid Practice</title>
  </head>
  <body>
    <div class="main-grid-wrapper">
      <div class="box">
        <h3>Box 1</h3>
      </div>
      <div class="box">
        <h3>Box 2</h3>
      </div>
      <div class="box">
        <h3>Box 3</h3>
      </div>
      <div class="box">
        <h3>Box 4</h3>
      </div>
      <div class="box box-5">
        <h3>Box 5</h3>
      </div>
      <div class="box">
        <h3>Box 6</h3>
      </div>
    </div>

    <br />
    <br />

    <div class="page">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h2>Menu</h2>
        <p>Dashboard</p>
        <p>Profile</p>
        <p>Settings</p>
        <p>Logout</p>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- TOP BAR -->
        <header class="topbar">
          <h2>My Dashboard</h2>
        </header>

        <!-- CARDS -->
        <section class="cards">
          <div class="card">Card 1</div>
          <div class="card">Card 2</div>
          <div class="card">Card 3</div>
          <div class="card">Card 4</div>
          <div class="card">Card 5</div>
          <div class="card">Card 6</div>
        </section>
      </main>
    </div>

</html>
